<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Information Table</title>
    <link rel="stylesheet" href="js_std_record.css">
</head>

<body>
    <div class="both-table">

        <table class="table-items">
            <h1>Application form</h1>
            </h1>
            <tr>
                <td>Name</td>
                <td><input id="ip-name" type="text" placeholder="enter text" required></td>
            </tr>
            <tr>
                <td>age</td>
                <td><input id="ip-age" type="number" required placeholder="Number"></td>
            </tr>
            <tr>
                <td>gender</td>
                <td><select id="ip-gender">
                        <option></option>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Third gender</option>
                    </select></td>
            </tr>
            <tr>
                <td>Marital status</td>
                <td><select id="ip-marital">
                        <option value=""></option>
                        <option value="">Unmaried</option>
                        <option value="">Maried</option>
                    </select></td>
            </tr>
            <tr>
                <td>Department</td>
                <td><select id="ip-depart">
                        <option value=""></option>
                        <option value="">ECE</option>
                        <option value="">EEE</option>
                        <option value="">CSE</option>
                        <option value="">MECH</option>
                    </select></td>
            </tr>
            <tr>
                <td>Language</td>
                <td><select id="ip-sports">
                        <option value=""></option>
                        <option value="">Python</option>
                        <option value="">Java</option>
                        <option value="">C</option>
                    </select></td>
            </tr>
            <tr>
                <td class="last-row"></td>
                <td class="last-row"><button onclick="submitting()" id="submit">Submit</button></td>
            </tr>
        </table>


        <h1 class="record-topic">Student Record</h1>
        <div class="info-div">

            <table class="info-table">
                <th>name</th>
                <th>age</th>
                <th>Gender</th>
                <th>Marital status</th>
                <th>Department</th>
                <th>Language</th>
                <th>Action</th>

            </table>
        </div>
    </div>
    <script>
        var ip_name = document.getElementById("ip-name")
        var ip_age = document.getElementById("ip-age")
        var ip_gender = document.getElementById("ip-gender")
        var ip_marital = document.getElementById("ip-marital")
        var ip_depart = document.getElementById("ip-depart")
        var ip_sports = document.getElementById("ip-sports")
        var sumbit = document.getElementById("submit")
        var info_table = document.querySelector(".info-table")

        function submitting() {
            var new_row = document.createElement("tr")

            var new_element_name = document.createElement("td")
            new_element_name.innerHTML = ip_name.value
            new_row.append(new_element_name)

            var new_element_age = document.createElement("td")
            new_element_age.innerHTML = ip_age.value
            new_row.append(new_element_age)


            var gender_text = document.getElementById("ip-gender").options[ip_gender.selectedIndex].text
            var new_element_gender = document.createElement("td")
            new_element_gender.innerHTML = gender_text
            new_row.append(new_element_gender)

            var marital_text = document.getElementById("ip-marital").options[ip_marital.selectedIndex].text
            var new_element_marital = document.createElement("td")
            new_element_marital.innerHTML = marital_text
            new_row.append(new_element_marital)

            var depart_text = document.getElementById("ip-depart").options[ip_depart.selectedIndex].text
            var new_element_depart = document.createElement("td")
            new_element_depart.innerHTML = depart_text
            new_row.append(new_element_depart)


            var sports_text = document.getElementById("ip-sports").options[ip_sports.selectedIndex].text
            var new_element_sports = document.createElement("td")
            new_element_sports.innerHTML = sports_text
            new_row.append(new_element_sports)


            var new_element_del = document.createElement("td")
            new_element_del.innerHTML = "<button onclick='remove(event)' >Remove</button>"
            new_row.append(new_element_del)

            info_table.append(new_row)
        }
        function remove(event) {
            event.target.parentElement.parentElement.remove()
        }

    </script>
</body>

</html>
