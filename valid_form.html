<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error login page</title>
    <link rel="stylesheet" href="valid_form.css">
</head>

<body>
    <form action="Js_std_record.html" id="form">
        <h1>SIGN UP</h1>
        <div class="form-div">
            <label for="name">Name</label>
            <input type="text" id="name" placeholder="enter name">
            <p></p>
        </div>
        <div class="form-div">
            <label for="number">Number</label>
            <input type="number" id="number" placeholder="enter number">
            <p></p>
        </div>
        <div class="form-div">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="enter email">
            <p></p>
        </div>
        <div class="form-div">
            <label for="password">Password</label>
            <input type="text" id="password" placeholder="enter Password">
            <p></p>
        </div>
        <div class="form-div"> 
            <label for="c-password">Re-enter Password</label>
            <input type="text" id="c-password" placeholder="re-enter Password">
            <p></p>
        </div>
        <div class="button"><input id="sbt-btn" type="submit"></div>
    </form>

    <script src="valid_form.js"></script>

</body>

</html>
